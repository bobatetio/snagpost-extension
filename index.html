<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SocialPulse — Design Preview</title>
    <style>
      :root { color-scheme: light; }
      html, body {
        margin: 0;
        height: 100%;
        font-family: "Inter", system-ui, sans-serif;
        background: #F5F2ED;
        overflow: hidden;
      }
      body::before, body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }
      body::before {
        background: radial-gradient(1200px 600px at 20% 10%, #E8DFFF 0%, transparent 60%);
        animation: drift-a 18s ease-in-out infinite alternate;
      }
      body::after {
        background: radial-gradient(900px 500px at 80% 80%, #FFE8DC 0%, transparent 55%);
        animation: drift-b 22s ease-in-out infinite alternate;
      }
      @keyframes drift-a {
        from { transform: translate3d(-3%, -2%, 0) scale(1); }
        to   { transform: translate3d(4%, 3%, 0) scale(1.06); }
      }
      @keyframes drift-b {
        from { transform: translate3d(2%, 3%, 0) scale(1); }
        to   { transform: translate3d(-4%, -2%, 0) scale(1.08); }
      }
      .stage {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #5C5670;
        font-size: 13px;
        text-align: center;
        padding: 40px;
        pointer-events: none;
      }
      .stage span {
        background: rgba(253, 252, 250, 0.7);
        padding: 10px 16px;
        border-radius: 999px;
        backdrop-filter: blur(6px);
      }
    </style>
  </head>
  <body>
    <div class="stage"><span>This is a localhost preview of the SocialPulse Chrome panel — the panel and bubble below render identically inside Facebook.</span></div>
    <script type="module" src="/src/preview/index.tsx"></script>
  </body>
</html>
